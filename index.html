<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1c39bb" />
  <title>Yosan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles.css?v=72" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="brand">
        <span class="logo" aria-hidden="true"><svg width="25" height="25" viewBox="0 0 48 48"><g fill="none" stroke="#fff" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round" transform="translate(0 48) scale(1 -1)"><path d="M13 13 L24 27 L35 13"/><path d="M24 27 V37"/><path d="M16 28 H32"/><path d="M16 33 H32"/></g></svg></span>
        <h1 class="wordmark">Yosan</h1>
        <div class="brand-actions">
          <button class="btn btn-primary btn-sm" id="header-log" hidden>Log spend</button>
          <button class="icon-btn" id="settings-btn" aria-label="Settings and backup" title="Settings &amp; backup">⚙️</button>
        </div>
      </div>
      <nav class="tabs" id="tabs">
        <button class="tab active" data-view="dashboard">Overview</button>
        <button class="tab" data-view="spend">Spend</button>
        <button class="tab" data-view="history">History</button>
        <button class="tab" data-view="report">Report</button>
        <button class="tab" data-view="results">Results</button>
      </nav>
    </header>

    <main id="main">
      <!-- Views are rendered here by app.js -->
    </main>
  </div>

  <!-- Modal host -->
  <div id="modal-root"></div>

  <!-- Firebase SDK (compat) — optional cloud sync; app still works if these fail to load -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="cloud.js?v=72"></script>
  <script src="app.js?v=72"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
