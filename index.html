<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1c39bb" />
  <title>Kelly's Payday Budget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles.css?v=26" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="brand">
        <span class="logo">🐶</span>
        <h1>Kelly's Payday Budget</h1>
        <button class="icon-btn" id="settings-btn" aria-label="Settings and backup" title="Settings &amp; backup">⚙️</button>
      </div>
      <nav class="tabs" id="tabs">
        <button class="tab active" data-view="dashboard">Overview</button>
        <button class="tab" data-view="spend">Spend</button>
        <button class="tab" data-view="history">History</button>
        <button class="tab" data-view="report">Report</button>
      </nav>
    </header>

    <main id="main">
      <!-- Views are rendered here by app.js -->
    </main>
  </div>

  <!-- Modal host -->
  <div id="modal-root"></div>

  <script src="app.js?v=26"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
